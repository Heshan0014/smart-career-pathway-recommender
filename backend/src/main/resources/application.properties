spring.application.name=smart-career-backend
server.port=${SERVER_PORT:8001}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/smart_career_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mpostgresql}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:mpostgresqlmpostgresqlmpostgresqlmpostgresql}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:180}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001}

# Expose API error reason so frontend can display exact signup/login failures.
server.error.include-message=always

# Allow larger Stage 2 certificate image payloads.
server.tomcat.max-http-form-post-size=10MB
server.tomcat.max-swallow-size=10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Admin credentials (hardcoded for single admin)
admin.email=${ADMIN_EMAIL:admin@smartcareer.com}
admin.password=${ADMIN_PASSWORD:AdminSecure123!}
